# docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    image: php:8.2-fpm-alpine
    volumes:
      - ./src:/var/www/html

  mariadb:
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: password_segura_aqui
      MARIADB_DATABASE: app_db
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
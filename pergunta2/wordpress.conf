# wordpress.conf
# Server block Nginx para WordPress, com proxy para LSPHP e otimizações de performance.

server {
    listen 80;
    server_name example.com www.example.com;
    root /var/www/example.com/htdocs;
    index index.php index.html;

    access_log /var/log/nginx/example.com.access.log;
    error_log  /var/log/nginx/example.com.error.log;

    # 1. Regra de Rewrite Padrão do WordPress
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # 2. Definição de Bypass de Cache (Prevenção de vazamento de sessão)
    # Ignora o cache se a requisição for para o painel ou se o usuário tiver cookie de login
    set $skip_cache 0;
    if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|^/feed/*|/tag/.*/feed/*|index.php|/.*sitemap.*\.(xml|xsl)") {
        set $skip_cache 1;
    }
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
        set $skip_cache 1;
    }

    # 3. Encaminhamento PHP para o worker (LSPHP)
    location ~ \.php$ {
        include /etc/nginx/fastcgi_params;
        # Encaminha para o socket/porta do LSPHP (o caminho exato depende da instalação do LiteSpeed)
        fastcgi_pass unix:/tmp/lsphp.sock; 
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Passa a variável de bypass para o worker entender quando NÃO usar o cache
        fastcgi_param LITESPEED_SKIP_CACHE $skip_cache;
    }

    # 4. Ajuste de Performance: Cache no navegador para arquivos estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 5. Segurança: Bloqueia execução de scripts maliciosos na pasta de uploads
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    # Segurança: Esconde arquivos ocultos como .htaccess, .env, .git
    location ~ /\. {
        deny all;
    }
}